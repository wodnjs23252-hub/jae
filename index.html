<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="간단한 목적만 입력하면 바로 쓸 수 있는 AI 프롬프트를 만들어주는 도구"
    />
    <title>프롬프트 빌더</title>
    <link rel="stylesheet" href="./styles.css?v=20260509-role-inference-2" />
  </head>
  <body>
    <main class="app-shell">
      <section class="workspace" aria-label="프롬프트 빌더">
        <header class="topbar">
          <div class="brand">
            <div class="brand-mark" aria-hidden="true">PB</div>
            <div>
              <p class="eyebrow">Prompt Builder</p>
              <h1>프롬프트 빌더</h1>
            </div>
          </div>
          <button class="ghost-button" type="button" id="resetButton" title="입력 초기화">초기화</button>
        </header>

        <div class="builder-grid">
          <section class="input-panel" aria-label="목적 입력">
            <div class="section-heading">
              <span class="step-badge">1</span>
              <div>
                <h2>목적만 적어주세요</h2>
                <p>나머지 구조, 역할, 출력 형식은 자동으로 맞춰서 프롬프트를 만듭니다.</p>
              </div>
            </div>

            <label class="field purpose-field">
              <span>만들고 싶은 것</span>
              <textarea
                id="purpose"
                rows="7"
                placeholder="예: 신제품을 기존 고객에게 소개하는 이메일을 만들고 싶어"
                autofocus
              ></textarea>
            </label>

            <div class="example-row" aria-label="예시 목적">
              <button type="button" class="example-chip">회의록을 핵심만 요약해줘</button>
              <button type="button" class="example-chip">인스타 홍보 문구 3개 만들어줘</button>
              <button type="button" class="example-chip">파이썬 오류를 고치는 질문을 만들어줘</button>
            </div>

            <details class="advanced-box">
              <summary>필요하면 세부 옵션 추가</summary>
              <div class="advanced-grid">
                <label class="field">
                  <span>결과 형식</span>
                  <select id="outputType">
                    <option value="">자동</option>
                    <option>이메일</option>
                    <option>요약문</option>
                    <option>보고서</option>
                    <option>마케팅 문구</option>
                    <option>코드 요청서</option>
                    <option>학습 계획</option>
                    <option>표</option>
                  </select>
                </label>

                <label class="field">
                  <span>톤</span>
                  <select id="tone">
                    <option value="">자동</option>
                    <option>전문적이고 설득력 있는</option>
                    <option>친근하고 쉬운</option>
                    <option>간결하고 실용적인</option>
                    <option>창의적이고 생동감 있는</option>
                  </select>
                </label>

                <label class="field wide">
                  <span>대상</span>
                  <input id="audience" type="text" placeholder="예: 고객, 팀장, 초보 개발자" />
                </label>
              </div>
            </details>

            <div class="button-row">
              <button class="primary-button" type="button" id="copyButton">프롬프트 복사</button>
              <span id="autoLabel" class="auto-label">입력하면 자동 생성됩니다</span>
            </div>
          </section>

          <aside class="preview-panel" aria-label="프롬프트 미리보기">
            <div class="preview-toolbar">
              <div>
                <p class="eyebrow">Preview</p>
                <h2>자동 생성 프롬프트</h2>
              </div>
              <div class="template-pill" id="templatePill">자동 분류 대기</div>
            </div>

            <textarea id="promptPreview" class="prompt-preview" spellcheck="false"></textarea>

            <section class="history-block" aria-label="최근 프롬프트">
              <div class="history-heading">
                <h3>최근 복사</h3>
                <button type="button" id="clearHistory">비우기</button>
              </div>
              <div id="historyList" class="history-list"></div>
            </section>
          </aside>
        </div>
      </section>
    </main>

    <div class="toast" id="toast" role="status" aria-live="polite"></div>
    <script src="./app.js?v=20260509-role-inference-2"></script>
  </body>
</html>
